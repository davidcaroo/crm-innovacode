name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Debug SSH connection
        run: |
          echo "== SSH debug: attempting simple connection (exit 0 on failure) =="
          ssh -o BatchMode=yes -p ${{ secrets.SSH_PORT }} -vvv ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} exit || true
      
      - name: Deploy to Hostinger via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='logs/*.log' \
            --exclude='config/config.php' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='old_files_backup' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ $SSH_USER@$SSH_HOST:/home/$SSH_USER/domains/crm.bahariaqua.com/public_html/
      
      - name: Run post-deployment tasks
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            cd /home/$SSH_USER/domains/crm.bahariaqua.com/public_html/
            
            # Ensure logs directory exists and has correct permissions
            mkdir -p logs
            chmod 755 logs
            touch logs/.gitkeep
            
            # Create uploads directory if needed
            mkdir -p uploads
            chmod 755 uploads
            
            echo "Deployment completed successfully!"
          EOF
      
      - name: Deployment notification
        if: success()
        run: echo "✅ Deployment to crm.bahariaqua.com completed successfully!"
      
      - name: Deployment failed notification
        if: failure()
        run: echo "❌ Deployment to crm.bahariaqua.com failed!"
